services:
  - type: web
    name: churnshield-backend
    env: python
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: churnshield-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: churnshield-db
    databaseName: churnshield
    user: churnshield_user
